network:
  version: 2
  renderer: networkd
  ethernets:
    enp4s0f1:
      dhcp4: false
      addresses:
        - 192.168.1.100/24
      # Don't set gateway4 here — WiFi will be your default route
      routes:
        # Optional: add route to AntSDR subnet if needed elsewhere
        - to: 192.168.1.0/24
          via: 192.168.1.1
          metric: 100
  wifis:
    wlp3s0:
      dhcp4: true
      dhcp4-overrides:
        route-metric: 50  # Lower metric = preferred for default route
      access-points:
        "YourSSID":
          password: "YourPassword"
